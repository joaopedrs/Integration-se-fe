<div class="login-container">
    <div class="login-form">
      <h2>Entrar</h2>
  
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput formControlName="email" type="email" placeholder="exemplo@dominio.com" />
        </mat-form-field>
  
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="password" type="password" placeholder="Digite a sua senha" />
        </mat-form-field>
  
        <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid" class="full-width btn-login">
          Entrar
        </button>
      </form>
    </div>
  
    <div class="login-image">
      <div class="placeholder-img">Integração ITSM</div>
    </div>
  </div>
