<h2 mat-dialog-title>{{ isEditMode ? 'Editar Parâmetro' : 'Novo Parâmetro' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Descrição</mat-label>
      <input matInput formControlName="description" placeholder="Ex: URL_API_SISTEMA_A" />
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Valor</mat-label>
      <input matInput formControlName="value" placeholder="Digite o valor correspondente" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid" (click)="onSave()">
    Salvar
  </button>
</mat-dialog-actions>
