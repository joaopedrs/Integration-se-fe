<div class="crud-container">
  
    <div class="action-bar">
      <div class="action-title">
        <h2>Usuários</h2>
        <span class="subtitle">Gestão de acesso ao sistema</span>
      </div>
  
      <div class="action-buttons">
        <button mat-flat-button color="primary" (click)="onAdd()">
          <mat-icon>add</mat-icon> Novo Registro
        </button>
        <button mat-stroked-button color="accent" [disabled]="selection.selected.length !== 1" (click)="onEdit()">
          <mat-icon>edit</mat-icon> Editar
        </button>
        <button mat-stroked-button color="warn" [disabled]="selection.selected.length === 0" (click)="onDelete()">
          <mat-icon>block</mat-icon> Inativar
        </button>
      </div>
    </div>
  
    <div class="table-container mat-elevation-z2">
      <table mat-table [dataSource]="dataSource">
  
        <ng-container matColumnDef="select">
          <th mat-header-cell *matHeaderCellDef class="checkbox-column">
            <mat-checkbox (change)="$event ? toggleAllRows() : null"
                          [checked]="selection.hasValue() && isAllSelected()"
                          [indeterminate]="selection.hasValue() && !isAllSelected()"
                          color="primary"></mat-checkbox>
          </th>
          <td mat-cell *matCellDef="let row" class="checkbox-column">
            <mat-checkbox (click)="$event.stopPropagation()"
                          (change)="$event ? selection.toggle(row) : null"
                          [checked]="selection.isSelected(row)"
                          color="primary"></mat-checkbox>
          </td>
        </ng-container>
  
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>
  
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> Nome </th>
          <td mat-cell *matCellDef="let element"> <strong>{{element.name}}</strong> </td>
        </ng-container>
  
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef> E-mail </th>
          <td mat-cell *matCellDef="let element"> {{element.email}} </td>
        </ng-container>
  
        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef> Perfil </th>
          <td mat-cell *matCellDef="let element"> {{getRoleName(element.role)}} </td>
        </ng-container>
  
        <ng-container matColumnDef="isActive">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let element"> 
            <mat-chip-listbox>
              <mat-chip-option [color]="element.isActive ? 'primary' : 'warn'" selected disabled>
                {{ element.isActive ? 'Ativo' : 'Inativo' }}
              </mat-chip-option>
            </mat-chip-listbox>
          </td>
        </ng-container>
  
        <ng-container matColumnDef="lastLogin">
          <th mat-header-cell *matHeaderCellDef> Último Acesso </th>
          <td mat-cell *matCellDef="let element"> 
            <span class="text-muted">{{ (element.lastLogin | date:'dd/MM/yyyy HH:mm') || 'Nunca acessou' }}</span>
          </td>
        </ng-container>
  
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"
            (click)="selection.toggle(row)" [class.selected-row]="selection.isSelected(row)">
        </tr>
      </table>
    </div>
  </div>
