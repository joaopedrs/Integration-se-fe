<div class="dashboard-container">
    <div class="header-section">
      <h2>Desempenho e Pontuação</h2>
      <span class="subtitle">Análise de produtividade por Profissional e Squad</span>
    </div>
  
    <div class="controls-section">
      <mat-button-toggle-group [value]="filter.viewType" (change)="onViewTypeChange($event.value)" class="view-toggle">
        <mat-button-toggle value="month">Últimos 3 Meses (Mensal)</mat-button-toggle>
        <mat-button-toggle value="week">Mês Atual (Semanal)</mat-button-toggle>
      </mat-button-toggle-group>
  
      <mat-form-field appearance="outline" class="user-select">
        <mat-label>Comparar Usuários</mat-label>
        <mat-select multiple [(ngModel)]="filter.userIds" (selectionChange)="onUserSelectionChange()">
          <mat-option *ngFor="let user of options.users" [value]="user.id">
            {{ user.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  
    <div class="section-title fade-in">
      <h3>Comparar Squads</h3>
    </div>
  
    <div class="cards-grid fade-in">
      <mat-card 
        *ngFor="let squad of options.squads" 
        class="metric-card" 
        [class.selected]="filter.squadIds.includes(squad.id)"
        matRipple 
        (click)="toggleSquad(squad.id)">
        <mat-card-content>
          <div class="card-icon" [class.active-icon]="filter.squadIds.includes(squad.id)">
            <mat-icon>groups</mat-icon>
          </div>
          <div class="card-info">
            <span class="card-title">{{ squad.description }}</span>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
  
    <div class="chart-wrapper mat-elevation-z2 fade-in" *ngIf="filter.squadIds.length > 0 || filter.userIds.length > 0">
      <canvas baseChart
        [data]="lineChartData"
        [options]="lineChartOptions"
        [type]="lineChartType">
      </canvas>
    </div>
  
    <div class="empty-state" *ngIf="filter.squadIds.length === 0 && filter.userIds.length === 0">
      <mat-icon>show_chart</mat-icon>
      <p>Selecione um usuário ou uma squad acima para visualizar o comparativo de desempenho.</p>
    </div>
  </div>
